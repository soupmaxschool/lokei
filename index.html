<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Proxy</title>
  <style>
    body { margin: 0; background: #111; color: #fff; font-family: sans-serif; }
    #bar { padding: 10px; background: #222; display: flex; gap: 10px; }
    #input { flex: 1; padding: 8px; font-size: 16px; border-radius: 4px; border: none; }
    #go { padding: 8px 16px; background: #4caf50; border: none; border-radius: 4px; color: white; cursor: pointer; }
    #frame { width: 100%; height: calc(100vh - 50px); border: none; background: white; }
  </style>
</head>
<body>

  <div id="bar">
    <input id="input" placeholder="Enter URL…">
    <button id="go">Go</button>
  </div>

  <iframe id="frame"></iframe>

  <script>
    const input = document.getElementById("input");
    const btn = document.getElementById("go");
    const frame = document.getElementById("frame");

    // YOUR REAL DOMAIN — NO RELATIVE PATHS
    const BASE = "https://lokei-cyan.vercel.app";

    async function load() {
      let url = input.value.trim();
      if (!url) return;

      if (!url.startsWith("http")) url = "https://" + url;

      const endpoint = BASE + "/api/p?url=" + encodeURIComponent(url);
      console.log("Loading:", endpoint);

      const html = await fetch(endpoint).then(r => r.text());
      frame.srcdoc = html;
    }

    btn.onclick = load;
    input.addEventListener("keydown", e => e.key === "Enter" && load());
  </script>

</body>
</html>
