<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mini Proxy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: dark light;
      --bg: #05060a;
      --fg: #f5f5f7;
      --accent: #4f8cff;
      --border: #2b2d3a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1rem 1.5rem;
      gap: 0.75rem;
    }
    form {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    input[type="url"] {
      flex: 1 1 260px;
      padding: 0.6rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #0b0d14;
      color: var(--fg);
      outline: none;
      font-size: 0.95rem;
    }
    input[type="url"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--accent) 60%, transparent);
    }
    button {
      padding: 0.6rem 1.1rem;
      border-radius: 999px;
      border: none;
      background: var(--accent);
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
    }
    button:disabled {
      opacity: 0.6;
      cursor: default;
    }
    #status {
      font-size: 0.8rem;
      opacity: 0.8;
      min-height: 1.2em;
    }
    #frame-wrapper {
      flex: 1;
      border-radius: 0.75rem;
      border: 1px solid var(--border);
      overflow: hidden;
      background: #05060a;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
    @media (max-width: 640px) {
      header, main {
        padding: 0.75rem 1rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Mini Proxy</h1>
    <span style="font-size:0.8rem; opacity:0.7;">Fetch pages via your Vercel backend</span>
  </header>

  <main>
    <form id="proxy-form">
      <input
        id="url-input"
        type="url"
        placeholder="https://example.com"
        autocomplete="off"
        required
      />
      <button type="submit">Go</button>
    </form>
    <div id="status"></div>
    <div id="frame-wrapper">
      <iframe id="proxy-frame" title="Proxy view"></iframe>
    </div>
  </main>

  <script>
    const form = document.getElementById("proxy-form");
    const input = document.getElementById("url-input");
    const frame = document.getElementById("proxy-frame");
    const statusEl = document.getElementById("status");

    const PROXY_ENDPOINT = "/api/proxy"; // adjust if needed

    function normaliseUrl(raw) {
      if (!raw) return null;
      try {
        // Add https:// if user omitted scheme
        if (!/^https?:\/\//i.test(raw)) {
          raw = "https://" + raw;
        }
        return new URL(raw).toString();
      } catch {
        return null;
      }
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const raw = input.value.trim();
      const target = normaliseUrl(raw);

      if (!target) {
        statusEl.textContent = "Invalid URL.";
        return;
      }

      statusEl.textContent = "Loading via proxy…";
      const encoded = encodeURIComponent(target);
      const proxiedUrl = `${PROXY_ENDPOINT}?url=${encoded}`;

      // Load into iframe
      frame.src = proxiedUrl;
    });

    frame.addEventListener("load", () => {
      if (frame.src) {
        statusEl.textContent = "";
      }
    });

    frame.addEventListener("error", () => {
      statusEl.textContent = "Failed to load page via proxy.";
    });
  </script>
</body>
</html>
