<!DOCTYPE html>
<html>
<head>
  <title>Proxy</title>
  <style>
    body { margin: 0; padding: 0; }
    #searchBar {
      padding: 10px;
      background: #222;
      color: white;
      display: flex;
      gap: 10px;
    }
    #searchInput {
      flex: 1;
      padding: 8px;
      font-size: 16px;
    }
    #output {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
    }
  </style>
</head>
<body>

  <div id="searchBar">
    <input id="searchInput" placeholder="Enter URL…" />
    <button id="goBtn">Go</button>
  </div>

  <iframe id="output"></iframe>

  <script>
    const input = document.getElementById("searchInput");
    const btn = document.getElementById("goBtn");
    const frame = document.getElementById("output");

    async function loadSite() {
      const url = input.value.trim();
      if (!url) return;

      const encoded = encodeURIComponent(url);

      const response = await fetch("/api/p?url=" + encoded);
      const text = await response.text();

      frame.srcdoc = text;
    }

    btn.onclick = loadSite;

    input.addEventListener("keydown", e => {
      if (e.key === "Enter") loadSite();
    });
  </script>

</body>
</html>
