<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mini Browser</title>
  <style>
    html, body { margin:0; height:100%; }
    body { display:flex; flex-direction:column; background:#111; color:#eee; }
    header { padding:10px; background:#222; display:flex; gap:10px; }
    input { flex:1; padding:8px; border-radius:6px; border:none; }
    button { padding:8px 14px; border:none; border-radius:6px; background:#4f8cff; color:white; }
    iframe { flex:1; width:100%; border:none; background:white; }
  </style>
</head>
<body>

<header>
  <form id="f" style="display:flex; gap:10px; flex:1;">
    <input id="u" placeholder="https://example.com">
    <button>Go</button>
  </form>
</header>

<iframe id="v"></iframe>

<script>
  const f = document.getElementById("f");
  const u = document.getElementById("u");
  const v = document.getElementById("v");

  f.onsubmit = e => {
    e.preventDefault();
    let url = u.value.trim();
    if (!/^https?:\/\//.test(url)) url = "https://" + url;
    v.src = "/api/p.js?url=" + encodeURIComponent(url);
  };

  // Support ?u= links from rewritten pages
  const params = new URLSearchParams(location.search);
  if (params.get("u")) {
    v.src = "/api/p.js?url=" + encodeURIComponent(params.get("u"));
  }
</script>

</body>
</html>
