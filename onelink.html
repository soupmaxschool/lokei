<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Viewer</title>
    <style>
        body {
            background: #111;
            color: #eee;
            font-family: Arial, sans-serif;
            margin: 0;
        }
        .topbar {
            padding: 10px;
            background: #222;
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 8px;
            border-radius: 4px;
            border: none;
        }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            background: #444;
            color: #fff;
            cursor: pointer;
        }
        iframe {
            width: 100%;
            height: calc(100vh - 50px);
            border: none;
            background: #000;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <input id="urlInput" type="text" placeholder="Enter a website URL (example: example.com)">
        <button onclick="loadSite()">View</button>
    </div>
    <iframe id="viewer" src=""></iframe>

    <script>
        function loadSite() {
            const input = document.getElementById('urlInput').value.trim();
            const iframe = document.getElementById('viewer');

            if (!input) return;

            let url = input;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }

            iframe.src = url;
        }

        // Optional: support ?url= parameter so the link stays the same
        const params = new URLSearchParams(window.location.search);
        const initial = params.get('url');
        if (initial) {
            document.getElementById('urlInput').value = initial;
            loadSite();
        }
    </script>
</body>
</html>
